const getUrgency = (c) => {
  if(!c.dateJ0||CLOSED.includes(c.statut)) return null;
  const t=todayDate();
  const checks=[
    {sent:c.r3Envoyee,due:addDays(c.dateJ0,16),label:"R3 J+16"},
    {sent:c.r2Envoyee,due:addDays(c.dateJ0,9), label:"R2 J+9"},
    {sent:c.r1Envoyee,due:addDays(c.dateJ0,4), label:"R1 J+4"},
  ];
  let worst=null;
  for(const ch of checks){
    if(!ch.sent&&ch.due<=t){const diff=Math.floor((t-ch.due)/86400000);if(!worst||diff>worst.diff)worst={...ch,diff};}
  }
  return worst;
};

const getRelancesAujourdhui = (contacts) => {
  const t=todayDate(); const results=[];
  contacts.forEach(c=>{
    if(!c.dateJ0||CLOSED.includes(c.statut)) return;
    [{sent:c.r1Envoyee,days:4,label:"Relance 1"},{sent:c.r2Envoyee,days:9,label:"Relance 2"},{sent:c.r3Envoyee,days:16,label:"Relance 3"}]

  });
  return results.sort((a,b)=>a.due-b.due);
};

async function sendViaBrevo(contact, htmlBody, subject, settings) {
  const res = await fetch("https://api.brevo.com/v3/smtp/email",{
    method:"POST",
    headers:{"api-key":settings.brevoApiKey,"Content-Type":"application/json"},
    body:JSON.stringify({
      sender:{name:settings.senderName||"Paul",email:settings.senderEmail},
      to:[{email:contact.email,name:contact.agence}],
      replyTo:{name:settings.senderName||"Paul",email:settings.replyToEmail||settings.senderEmail},
      subject, htmlContent:htmlBody
    })
  });
  if(!res.ok){const e=await res.json();throw new Error(e.message||"Erreur Brevo");}
  const data=await res.json();
  return data; // contient data.messageId
}

async function sendViaGmail(contact, htmlBody, subject, settings, gmailToken, inReplyTo) {
  // Encode subject with RFC 2047 for non-ASCII characters
  const encodeSubject=(s)=>`=?UTF-8?B?${btoa(unescape(encodeURIComponent(s)))}?=`;
  const headers=[
    `To: ${contact.email}`,
    `From: ${settings.senderName||"Paul"} <${settings.replyToEmail||settings.senderEmail||""}>`,
    `Subject: ${encodeSubject(subject)}`,
    "MIME-Version: 1.0",
    "Content-Type: text/html; charset=UTF-8",
  ];
  if(inReplyTo){
    headers.push(`In-Reply-To: ${inReplyTo}`);
    headers.push(`References: ${inReplyTo}`);
  }
  headers.push("",htmlBody);
  const raw=headers.join("\r\n");
  const encoded=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  const res=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",{
    method:"POST",
    headers:{"Authorization":`Bearer ${gmailToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({raw:encoded})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Erreur Gmail");}
  return await res.json();
}

// ── IMGBB UPLOAD ──────────────────────────────────────────
async function uploadToImgBB(dataUrl, apiKey) {
  const base64 = dataUrl.split(",")[1];
  const form = new FormData();
  form.append("image", base64);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method: "POST", body: form
  });
  const data = await res.json();
  if (!data.success) throw new Error("Erreur upload ImgBB : " + (data.error?.message||"inconnue"));
  return data.data.url;
}

async function uploadPairs(pairs, apiKey) {
  const results = [];
  for (const p of pairs) {
    const avant = p.avant.startsWith("data:") ? await uploadToImgBB(p.avant, apiKey) : p.avant;
    const apres = p.apres.startsWith("data:") ? await uploadToImgBB(p.apres, apiKey) : p.apres;
    results.push({avant, apres});
  }
  return results;
}

// ── BREVO SYNC ─────────────────────────────────────────────
async function checkBrevoOpened(email, brevoApiKey) {
  try {
    const url = `https://api.brevo.com/v3/smtp/statistics/events?email=${encodeURIComponent(email)}&days=90&limit=50`;
    const res = await fetch(url, {
      headers: { "api-key": brevoApiKey, "Accept": "application/json" }
    });
    if (!res.ok) {
      console.warn("[Brevo] API error", res.status);
      return false;
    }
    const data = await res.json();
    console.log("[Brevo] Events for", email, ":", data.events?.map(e=>e.event));
    return data.events && data.events.some(e => e.event==="opened" || e.event==="opens");
  } catch(e) {
    console.warn("[Brevo] Fetch error:", e);
    return false;
  }
}

async function syncBrevoOpenings(contacts, brevoApiKey) {
  const results = {};
  for (const c of contacts) {
    if (!c.email) continue;
    results[c.id] = await checkBrevoOpened(c.email, brevoApiKey);
    await new Promise(r => setTimeout(r, 400));
  }
  return results;
}

async function checkGmailReply(contact, gmailToken) {
  if(!gmailToken||!contact.email) throw new Error("Gmail non connecté");
  const query=`from:${contact.email}`;
  const url=`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(query)}&maxResults=3`;
  const res=await fetch(url,{headers:{"Authorization":`Bearer ${gmailToken}`}});
  if(!res.ok) throw new Error("Erreur accès Gmail");
  const data=await res.json();
  if(!data.messages||data.messages.length===0) return null;
  const msgRes=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${data.messages[0].id}?format=full`,{headers:{"Authorization":`Bearer ${gmailToken}`}});
  const msg=await msgRes.json();
  const headers=msg.payload.headers;
  const subject=headers.find(h=>h.name==="Subject")?.value||"(sans objet)";
  const date=headers.find(h=>h.name==="Date")?.value||"";
  let body="";
  const findBody=(parts)=>{
    if(!parts) return;
    for(const p of parts){
      if(p.mimeType==="text/plain"&&p.body?.data){body=decodeURIComponent(escape(atob(p.body.data.replace(/-/g,"+").replace(/_/g,"/"))));return;}
      if(p.parts) findBody(p.parts);
    }
  };
  if(msg.payload.body?.data) body=decodeURIComponent(escape(atob(msg.payload.body.data.replace(/-/g,"+").replace(/_/g,"/"))));
  else findBody(msg.payload.parts);
  return {subject,date,body:body.trim().substring(0,2000),messageId:msg.id};
}

const ActivityChart=({contacts})=>{
  const N=14; const data=[];
  for(let i=N-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);d.setHours(0,0,0,0);
    const nd=new Date(d);nd.setDate(nd.getDate()+1);
    const count=contacts.filter(c=>{if(!c.dateJ0)return false;const cd=new Date(c.dateJ0);cd.setHours(0,0,0,0);return cd>=d&&cd<nd;}).length;
    data.push({label:`${d.getDate()}/${d.getMonth()+1}`,count,isToday:i===0});
  }
  const max=Math.max(...data.map(d=>d.count),1);
  const W=440,H=80,barW=(W/N)-5;
  return <svg width={W} height={H+24} viewBox={`0 0 ${W} ${H+24}`}>
    {data.map((d,i)=>{
      const bH=Math.max((d.count/max)*H,d.count>0?6:2);const x=i*(W/N)+2;const y=H-bH;
      return <g key={i}>
        <rect x={x} y={y} width={barW} height={bH} fill={d.isToday?"#C4621A":d.count>0?"#F0A070":"#F0ECE4"} rx="3"/>
        {i%3===0&&<text x={x+barW/2} y={H+16} textAnchor="middle" fill="#BBB" fontSize="9">{d.label}</text>}
        {d.count>0&&<text x={x+barW/2} y={y-4} textAnchor="middle" fill="#C4621A" fontSize="9" fontWeight="700">{d.count}</text>}
      </g>;
    })}
  </svg>;
};

            border:`2px solid ${tpl===k?"#C4621A":"#E0DBD3"}`,background:tpl===k?"#FDE9D4":"white",color:tpl===k?"#C4621A":"#555"}}>
            {t.label}
          </div>
        ))}
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{width:370,flexShrink:0,padding:"18px 20px",overflowY:"auto",borderRight:"1px solid #F0ECE4"}}>

          {tpl==="initial" && <>
            <PairList pairs={s1Pairs} setPairs={setS1Pairs} color="orange" badge="Service 1" title="Transformation visuelle"/>
            <div style={{height:1,background:"#F0ECE4",margin:"4px 0 14px"}}/>
            <PairList pairs={s2Pairs} setPairs={setS2Pairs} color="blue" badge="Service 2" title="Mise en vie de pièce vide"/>
            <div style={{height:1,background:"#F0ECE4",margin:"4px 0 14px"}}/>
          </>}

          <div style={{marginBottom:14}}>
            <label>Objet du mail</label>
            <input value={subject} onChange={e=>setSubject(e.target.value)} style={{marginTop:4}}/>
          </div>

          {tpl==="initial" && <>
            <label>✏️ Accroche (phrase d'ouverture)</label>
            <textarea className="editable-field" value={accroche} onChange={e=>setAccroche(e.target.value)} rows={3} style={{marginTop:4,marginBottom:12}}/>
            <label>✏️ Question de closing</label>
            <textarea className="editable-field" value={closing} onChange={e=>setClosing(e.target.value)} rows={2} style={{marginTop:4}}/>
          </>}

          {!settings.brevoApiKey&&!gmailToken&&<div style={{marginTop:12,padding:"10px 14px",background:"#FEF3CD",border:"1px solid #FCD34D",borderRadius:7,fontSize:12,color:"#92400E"}}>⚠️ Configurez Brevo ou Gmail dans Paramètres.</div>}
          {err&&<div style={{marginTop:10,padding:"10px 14px",background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:7,fontSize:12,color:"#991B1B"}}>❌ {err}</div>}
        </div>

        <div style={{flex:1,padding:"18px 22px",overflowY:"auto",background:"#F8F5F0"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#AAA",letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10}}>Aperçu</div>
          <div style={{background:"white",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 8px rgba(0,0,0,0.08)"}}>
            <div dangerouslySetInnerHTML={{__html:getHtml()}}/>
          </div>
        </div>
      </div>

      <div style={{padding:"14px 28px",borderTop:"1px solid #F0ECE4",display:"flex",justifyContent:"flex-end",gap:10,flexShrink:0}}>
        <button className="btn-secondary" onClick={onClose}>Annuler</button>
        <button className="btn-primary" onClick={send} disabled={sending||(!settings.brevoApiKey&&!gmailToken)}>
          {sending?<><span className="spinner"></span>{sendStatus||"Envoi..."}</>:sendLabel}
        </button>
      </div>
    </div>
  </div>;
};

// ── PROSPECT LIST ─────────────────────────────────────────
const ProspectList=({contacts,onView,onAdd,onEdit,onDelete,onToggleRepondu,onForceSync,onScrape,onBulkGeneric})=>{
  const [search,setSearch]=useState(""); const [filterStatut,setFilterStatut]=useState(""); const [sortBy,setSortBy]=useState("urgence");
  const [selMode,setSelMode]=useState(false);
  const [selected,setSelected]=useState(new Set());

  const filtered=useMemo(()=>{
    let list=contacts.filter(c=>{
      const q=search.toLowerCase();
      const match=!q||[c.agence,c.email,c.ville,c.bien].some(v=>(v||"").toLowerCase().includes(q));
      return match&&(!filterStatut||c.statut===filterStatut);
    });
    if(sortBy==="urgence") list=list.sort((a,b)=>{const ua=getUrgency(a),ub=getUrgency(b);if(ua&&!ub)return -1;if(!ua&&ub)return 1;if(ua&&ub)return ub.diff-ua.diff;return new Date(b.createdAt||0)-new Date(a.createdAt||0);});
    else if(sortBy==="date") list=list.sort((a,b)=>new Date(b.dateJ0||0)-new Date(a.dateJ0||0));
    else list=list.sort((a,b)=>(a.agence||"").localeCompare(b.agence||""));
    return list;
  },[contacts,search,filterStatut,sortBy]);

  const nextRelance=(c)=>{
    if(!c.dateJ0) return null;
    if(!c.r1Envoyee) return {label:"R1",date:addDays(c.dateJ0,4)};
    if(!c.r2Envoyee) return {label:"R2",date:addDays(c.dateJ0,9)};
    if(!c.r3Envoyee) return {label:"R3",date:addDays(c.dateJ0,16)};
    return null;
  };

  const toggleSel=(id,e)=>{e.stopPropagation();setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});};
  const toggleAll=()=>setSelected(prev=>prev.size===filtered.length?new Set():new Set(filtered.map(c=>c.id)));
  const exitSelMode=()=>{setSelMode(false);setSelected(new Set());};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <h1 style={{fontSize:22,fontWeight:800}}>Prospects <span style={{color:"#CCC",fontWeight:400,fontSize:16}}>({contacts.length})</span></h1>
      <div style={{display:"flex",gap:10}}>
        {onForceSync&&<button onClick={onForceSync} style={{background:"#1C1C1C",color:"white",border:"none",padding:"10px 16px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer"}}>🔄 Vérifier ouvertures</button>}
        <button onClick={()=>{setSelMode(s=>!s);setSelected(new Set());}}
          style={{padding:"9px 16px",background:selMode?"#c4621a":"#1C1C1C",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>
          ⚡ Mail générique
        </button>
        <button className="btn-primary" onClick={onAdd}>+ Nouveau contact</button>
        <button onClick={onScrape} style={{padding:"9px 18px",background:"#1C1C1C",color:"#fff",border:"none",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>🔍 Scraper agences</button>
      </div>
    </div>

    {selMode&&<div style={{background:"#FEF3CD",border:"1px solid #FCD34D",borderRadius:8,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:12,fontSize:13}}>
      <span>⚡ Mode sélection activé — cliquez sur les contacts à inclure dans l'envoi</span>
      <button onClick={exitSelMode} style={{marginLeft:"auto",background:"none",border:"1px solid #999",borderRadius:5,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Annuler</button>
    </div>}

    <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
      <input style={{border:"1px solid #E0DBD3",borderRadius:7,padding:"9px 14px",fontSize:13,width:240,fontFamily:"Inter,sans-serif",outline:"none"}} placeholder="🔍  Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} style={{border:"1px solid #E0DBD3",borderRadius:7,padding:"9px 14px",fontSize:13,cursor:"pointer",background:"white",outline:"none"}}>
        <option value="">Tous les statuts</option>{STATUTS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
      </select>
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{border:"1px solid #E0DBD3",borderRadius:7,padding:"9px 14px",fontSize:13,cursor:"pointer",background:"white",outline:"none"}}>
        <option value="urgence">Trier : Urgence</option><option value="date">Trier : Date</option><option value="agence">Trier : Agence</option>
      </select>
    </div>
    <div className="card">
      {filtered.length===0?(
        <div style={{textAlign:"center",padding:56,color:"#999"}}>
          {contacts.length===0?(<div><div style={{fontSize:48,marginBottom:14}}>👥</div><p style={{fontWeight:700,fontSize:16,marginBottom:8}}>Aucun prospect encore</p><p style={{fontSize:13,marginBottom:24}}>Ajoutez vos premières agences</p><button className="btn-primary" onClick={onAdd}>+ Ajouter un contact</button></div>):"Aucun résultat"}
        </div>
      ):(
        <table>
          <thead><tr>
            {selMode&&<th style={{width:36}}><input type="checkbox" checked={selected.size===filtered.length&&filtered.length>0} onChange={toggleAll} style={{width:16,height:16,cursor:"pointer"}}/></th>}
            <th style={{whiteSpace:"nowrap"}}>Urgence</th><th>Agence</th><th>Statut</th><th style={{whiteSpace:"nowrap"}}>Date J+0</th><th style={{whiteSpace:"nowrap"}}>Relance</th><th style={{whiteSpace:"nowrap"}}>Mail ouvert</th><th style={{whiteSpace:"nowrap"}}>Mail répondu</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(c=>{
              const urg=getUrgency(c); const nr=nextRelance(c); const ouvert=c.mailOuvert||c.yamm;
              const isSel=selected.has(c.id);
              return <tr key={c.id} onClick={selMode?(e)=>toggleSel(c.id,e):()=>onView(c.id)}
                style={{cursor:"pointer",background:isSel?"#FEF3CD":"",transition:"background 0.15s"}}>
                {selMode&&<td onClick={e=>toggleSel(c.id,e)}><input type="checkbox" checked={isSel} onChange={()=>{}} style={{width:16,height:16,cursor:"pointer"}}/></td>}
                <td>{urg?<span style={{background:"#FEE2E2",color:"#DC2626",padding:"3px 9px",borderRadius:10,fontSize:10,fontWeight:700}}>🔴 {urg.label}</span>:<span style={{color:"#E0DBD3",fontSize:12}}>—</span>}</td>
                <td><div style={{fontWeight:700}}>{c.agence}</div><div style={{fontSize:11,color:"#999"}}>{c.email}</div></td>
                <td><StatusBadge value={c.statut}/></td>
                <td style={{fontSize:12,color:"#666"}}>{formatDate(c.dateJ0)}</td>
                <td style={{fontSize:12,color:"#666",whiteSpace:"nowrap"}}>{nr?`${nr.label} ${formatDate(nr.date.toISOString())}`:<span style={{color:"#E0DBD3"}}>—</span>}</td>
                <td style={{textAlign:"center"}}>
                  {ouvert?<span style={{background:"#D1FAE5",color:"#065F46",padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:700}}>✓ Ouvert</span>:<span style={{background:"#F3F4F6",color:"#9CA3AF",padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:600}}>✗</span>}
                </td>
                <td style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
                  <span onClick={()=>onToggleRepondu(c)}
                    style={{background:c.mailRepondu?"#DDEAF5":"#F3F4F6",color:c.mailRepondu?"#2A5FA5":"#9CA3AF",
                      padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:c.mailRepondu?700:600,cursor:"pointer"}}
                    title={c.mailRepondu?"":"Cliquer pour marquer comme répondu"}>
                    {c.mailRepondu?"✓ Répondu":"✗"}
                  </span>
                </td>
                <td onClick={e=>e.stopPropagation()}>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>onEdit(c)} style={{background:"none",border:"1px solid #E0DBD3",borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer"}}>✏️</button>
                    <button onClick={()=>{if(confirm("Supprimer ?"))onDelete(c.id);}} style={{background:"none",border:"1px solid #FCA5A5",borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer",color:"#DC2626"}}>🗑️</button>
                  </div>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      )}
    </div>

    {selMode&&selected.size>0&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1c1c1c",color:"#fff",borderRadius:12,padding:"16px 28px",display:"flex",alignItems:"center",gap:20,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",zIndex:999}}>
      <span style={{fontSize:14,fontWeight:600}}>{selected.size} contact{selected.size>1?"s":""} sélectionné{selected.size>1?"s":""}</span>
      <button onClick={exitSelMode} style={{background:"none",border:"1px solid #555",color:"#ccc",borderRadius:7,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>Annuler</button>
      <button onClick={()=>onBulkGeneric(contacts.filter(c=>selected.has(c.id)),exitSelMode)}
        style={{background:"#c4621a",color:"#fff",border:"none",borderRadius:7,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
        ⚡ Envoyer à {selected.size} contact{selected.size>1?"s":""}
      </button>
    </div>}
  </div>;
};

// ── PROSPECT DETAIL ───────────────────────────────────────
const ProspectDetail=({contact,onBack,onEdit,onSendEmail,onSendGeneric,onUpdate,onDelete,gmailToken})=>{
  const [checkingReply,setCheckingReply]=useState(false);
  const [replyErr,setReplyErr]=useState("");

  const toggle=(k)=>onUpdate({...contact,[k]:!contact[k]});

  const steps=[
    {label:"Mail initial envoyé", days:0,  doneKey:"mailInitialEnvoye", sentKey:null},
    {label:"Relance 1 (J+4)",     days:4,  doneKey:"r1Envoyee",        sentKey:"r1Envoyee"},
    {label:"Relance 2 (J+9)",     days:9,  doneKey:"r2Envoyee",        sentKey:"r2Envoyee"},
    {label:"Relance 3 (J+16)",    days:16, doneKey:"r3Envoyee",        sentKey:"r3Envoyee"},
  ];

  const checkReply=async()=>{
    if(!gmailToken) return setReplyErr("Gmail non connecté. Connectez Gmail dans Paramètres.");
    setCheckingReply(true);setReplyErr("");
    try{
      const reply=await checkGmailReply(contact,gmailToken);
      if(reply){
        onUpdate({...contact,replyContent:reply.body,replyDate:reply.date,replySubject:reply.subject,statut:"repondu"});
      } else {
        setReplyErr("Aucune réponse trouvée pour cette adresse.");
      }
    }catch(e){setReplyErr(e.message);}
    setCheckingReply(false);
  };

  const ouvert=contact.mailOuvert||contact.yamm;

  return <div>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:28}}>
      <button onClick={onBack} style={{background:"none",border:"1px solid #E0DBD3",borderRadius:7,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:500}}>← Retour</button>
      <div style={{flex:1}}>
        <h1 style={{fontSize:22,fontWeight:800}}>{contact.agence}</h1>
        <p style={{color:"#888",fontSize:13,marginTop:2}}>{contact.email}{contact.ville?` · ${contact.ville}`:""}</p>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn-secondary" onClick={()=>onEdit(contact)}>✏️ Modifier</button>
        <button style={{background:"#F5F3EF",color:"#1C1C1C",border:"1px solid #E0DBD3",padding:"10px 18px",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}} onClick={onSendGeneric}>⚡ Mail générique</button>
        <button className="btn-primary" onClick={onSendEmail}>✏️ Mail personnalisé</button>
        <button onClick={()=>{if(confirm("Supprimer ?"))onDelete(contact.id);}} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:7,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>🗑️</button>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
      {/* Infos */}
      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:11,fontWeight:700,color:"#AAA",letterSpacing:1,textTransform:"uppercase",marginBottom:18}}>Informations</h3>
        {[["📧","Email",contact.email],["📍","Ville",contact.ville],["📞","Téléphone",contact.telephone],].map(([icon,k,v])=>v?(<div key={k} style={{display:"flex",gap:12,marginBottom:12,fontSize:13,alignItems:"flex-start"}}><span style={{minWidth:20}}>{icon}</span><span style={{color:"#888",minWidth:90,fontSize:12}}>{k}</span><span style={{fontWeight:500,flex:1}}>{v}</span></div>):null)}
        <div style={{marginTop:16}}><label>Statut</label><select value={contact.statut} onChange={e=>onUpdate({...contact,statut:e.target.value})} style={{marginTop:4}}>{STATUTS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select></div>
        <div style={{marginTop:14,display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 14px",background:ouvert?"#EDE9FE":"#F8F5F0",borderRadius:8,border:`1px solid ${ouvert?"#C4B5FD":"#F0ECE4"}`}} onClick={()=>onUpdate({...contact,mailOuvert:!ouvert})}>
          <span style={{fontSize:18}}>{ouvert?"✅":"☐"}</span>
          <div><div style={{fontWeight:600,fontSize:13,color:ouvert?"#7C3AED":"#666"}}>Mail ouvert</div><div style={{fontSize:11,color:"#999"}}>Auto via Brevo · cliquer pour forcer</div></div>
        </div>
        <div style={{marginTop:10,display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 14px",background:contact.mailRepondu?"#DDEAF5":"#F8F5F0",borderRadius:8,border:`1px solid ${contact.mailRepondu?"#93C5FD":"#F0ECE4"}`}} onClick={()=>onUpdate({...contact,mailRepondu:!contact.mailRepondu,statut:!contact.mailRepondu&&contact.statut==="ouvert"?"repondu":contact.statut})}>
          <span style={{fontSize:18}}>{contact.mailRepondu?"✅":"☐"}</span>
          <div><div style={{fontWeight:600,fontSize:13,color:contact.mailRepondu?"#2A5FA5":"#666"}}>Mail répondu</div><div style={{fontSize:11,color:"#999"}}>Auto via Gmail · cliquer pour forcer</div></div>
        </div>
      </div>

      {/* Séquence */}
      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:11,fontWeight:700,color:"#AAA",letterSpacing:1,textTransform:"uppercase",marginBottom:20}}>Séquence</h3>
        {steps.map((step,i)=>{
          const done=contact[step.doneKey]||false;
          const due=contact.dateJ0?addDays(contact.dateJ0,step.days):null;
          const overdue=due&&!done&&due<todayDate()&&!!step.sentKey;
          return <div key={i} style={{display:"flex",gap:14,marginBottom:i<3?20:0,alignItems:"flex-start"}}>
            <div className="timeline-dot" style={{background:done?"#C4621A":overdue?"#FEE2E2":"#F0ECE4",color:done?"#fff":overdue?"#DC2626":"#CCC",border:overdue?"2px solid #DC2626":"none",fontSize:done?14:10}}>
              {done?"✓":`J+${step.days}`}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{step.label}</div>
                  <div style={{fontSize:11,color:overdue?"#DC2626":"#888"}}>{due?formatDate(due.toISOString()):"—"}{overdue?" · En retard !":""}</div>
                </div>
                {step.sentKey&&<input type="checkbox" checked={contact[step.sentKey]||false} onChange={()=>toggle(step.sentKey)} style={{width:18,height:18,accentColor:"#C4621A",cursor:"pointer"}}/>}
              </div>
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Notes */}
    <div className="card" style={{padding:24,marginBottom:20}}>
      <h3 style={{fontSize:11,fontWeight:700,color:"#AAA",letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Notes</h3>
      <textarea value={contact.notes||""} onChange={e=>onUpdate({...contact,notes:e.target.value})} rows={4} placeholder="Observations, ton de la réponse, suite à donner..." style={{resize:"vertical"}}/>
    </div>

    {/* Réponse du client */}
    <div className="card" style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{fontSize:11,fontWeight:700,color:"#AAA",letterSpacing:1,textTransform:"uppercase"}}>Réponse du client</h3>
        <button onClick={checkReply} disabled={checkingReply} style={{background:"#1C1C1C",color:"white",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
          {checkingReply?<><span className="spinner"></span>Vérification...</>:"🔄 Vérifier via Gmail"}
        </button>
      </div>
      {replyErr&&<div style={{padding:"10px 14px",background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:7,fontSize:12,color:"#991B1B",marginBottom:12}}>❌ {replyErr}</div>}
      {contact.replyContent?(
        <div className="reply-card">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:13,color:"#2A5FA5"}}>📩 {contact.replySubject||"(sans objet)"}</div>
            <div style={{fontSize:11,color:"#888"}}>{contact.replyDate?new Date(contact.replyDate).toLocaleDateString("fr-FR"):""}</div>
          </div>
          <div style={{fontSize:13,color:"#333",lineHeight:1.7,whiteSpace:"pre-wrap",background:"white",padding:"12px 14px",borderRadius:6,maxHeight:200,overflowY:"auto"}}>
            {contact.replyContent}
          </div>
          <button onClick={onSendEmail} style={{marginTop:12,background:"#2A5FA5",color:"white",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Répondre →</button>
        </div>
      ):(
        <div style={{textAlign:"center",padding:"24px 0",color:"#BBB",fontSize:13}}>
          <div style={{fontSize:32,marginBottom:8}}>📭</div>
          Aucune réponse détectée — cliquez "Vérifier" pour scanner votre boîte Gmail
        </div>
      )}
    </div>
  </div>;
};

// ── SETTINGS ──────────────────────────────────────────────
const Settings=({settings,onSave,onAutoSave,onImportCSV,gmailToken,onConnect,onDisconnect,contacts})=>{
  const [f,setF]=useState(settings);
  const csvInputRef=useRef(null);
  const set=(k,v)=>{const updated={...f,[k]:v};setF(updated);onAutoSave(updated);};
  const exportCSV=()=>{
    const rows=["Email,Agence,Ville,Téléphone,Bien,Date J0,Statut,Mail ouvert,Mail initial,R1,R2,R3,Notes",...contacts.map(c=>[c.email,c.agence,c.ville,c.telephone,c.bien,c.dateJ0,c.statut,c.mailOuvert||c.yamm,c.mailInitialEnvoye,c.r1Envoyee,c.r2Envoyee,c.r3Envoyee,`"${(c.notes||"").replace(/"/g,"\"\"")}"` ].join(","))].join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows],{type:"text/csv"}));a.download=`prospection_${new Date().toISOString().split("T")[0]}.csv`;a.click();
  };
  return <div>
    <h1 style={{fontSize:22,fontWeight:800,marginBottom:28}}>Paramètres</h1>

    {/* Anthropic - Scraper */}

// ── SCRAPER MODAL ────────────────────────────────────────────────────────────
const ScraperModal = ({contacts, onClose, onImport, geminiApiKey}) => {
  const [ville, setVille] = useState("");
  const [nb, setNb] = useState(10);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState("");
  const [results, setResults] = useState([]);
  const [done, setDone] = useState(false);

  const uuid = () => Math.random().toString(36).substr(2,9)+Date.now().toString(36);
  const today = () => new Date().toISOString().split("T")[0];

  const deduplicate = (imported) => {
    const existingEmails = new Set(contacts.map(c=>c.email?.toLowerCase()).filter(Boolean));
    const existingNames  = new Set(contacts.map(c=>c.agence?.toLowerCase().trim()).filter(Boolean));
    const existingTels   = new Set(contacts.map(c=>c.telephone?.replace(/\s/g,"")).filter(Boolean));
    return imported.filter(c => {
      if (c.email && existingEmails.has(c.email.toLowerCase())) return false;
      if (c.agence && existingNames.has(c.agence.toLowerCase().trim())) return false;
      if (c.telephone && existingTels.has(c.telephone.replace(/\s/g,""))) return false;
      return true;
    });
  };

  const scrape = async () => {
    if (!ville.trim()) return;
    if (!geminiApiKey) {
      setProgress("❌ Clé API Gemini manquante — configure-la dans Paramètres");
      setDone(true);
      return;
    }
    setLoading(true);
    setDone(false);
    setResults([]);
    const batchSize = 5;
    const batches = Math.ceil(nb / batchSize);
    let all = [];

    for (let b = 0; b < batches; b++) {
      const remaining = nb - all.length;
      const ask = Math.min(batchSize, remaining);
      setProgress(`🔍 Batch ${b+1}/${batches} — recherche de ${ask} agences à ${ville}...`);
      try {
        const prompt = `Recherche ${ask} agences immobilières DIFFÉRENTES à ${ville} (France) avec leurs emails réels.
${all.length > 0 ? `Évite ces agences déjà trouvées: ${all.slice(-20).map(a=>a.agence).join(", ")}` : ""}
Utilise Google pour trouver leurs vraies adresses email sur leur site, Google Maps, Pages Jaunes.
Réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant ou après.
Format: [{"agence":"NOM","email":"email@domain.fr","telephone":"XX XX XX XX XX","ville":"VILLE","site":"https://..."}]
- email obligatoire, sinon ne pas inclure l'agence`;

        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${geminiApiKey}`, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            tools: [{googleSearch:{}}],
            contents: [{role:"user", parts:[{text: prompt}]}],
            generationConfig: {temperature: 0.1, maxOutputTokens: 2048}
          })
        });

        if (!res.ok) {
          const errText = await res.text();
          setProgress(`❌ Erreur Gemini (${res.status}): ${errText.slice(0,200)}`);
          setLoading(false); setDone(true); return;
        }

        const data = await res.json();
        const raw = data.candidates?.[0]?.content?.parts?.filter(p=>p.text)?.map(p=>p.text)?.join("") || "";
        const jsonMatch = raw.match(/\[[\s\S]*\]/);
        if (!jsonMatch) { setProgress(`⚠️ Batch ${b+1}: pas de JSON — ${raw.slice(0,100)}`); continue; }
        const parsed = JSON.parse(jsonMatch[0]);
        const withIds = parsed.filter(a=>a.email).map(a=>({
          id: uuid(),
          agence: a.agence||"",
          email: a.email||"",
          telephone: a.telephone||"",
          ville: a.ville||ville,
          bien: "",
          dateJ0: today(),
          statut: "a_contacter",
          notes: a.site ? `Site: ${a.site}` : "",
          mailOuvert: false,
          yamm: false,
        }));
        all = [...all, ...withIds];
        setProgress(`✅ ${all.length}/${nb} agences trouvées...`);
      } catch(e) {
        setProgress(`❌ Erreur batch ${b+1}: ${e.message}`);
      }
      if (all.length >= nb) break;
      await new Promise(r=>setTimeout(r,5000)); // 5s entre batches (Gemini free: 15 RPM)
    }

    const deduped = deduplicate(all);
    const skipped = all.length - deduped.length;
    setResults(deduped);
    setProgress(`✅ Terminé — ${deduped.length} nouvelles agences${skipped>0?` (${skipped} doublons ignorés)`:""}`);
    setLoading(false);
    setDone(true);
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{background:"#fff",borderRadius:12,padding:36,width:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800}}>🔍 Scraper des agences</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>×</button>
      </div>

      <div style={{marginBottom:16}}>
        <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:6}}>VILLE OU RÉGION</label>
        <input value={ville} onChange={e=>setVille(e.target.value)}
          placeholder="ex: Lyon, Bordeaux, Marseille..."
          style={{width:"100%",padding:"10px 14px",border:"1px solid #e0dbd4",borderRadius:7,fontSize:14,boxSizing:"border-box"}}
          onKeyDown={e=>e.key==="Enter"&&!loading&&scrape()}
        />
      </div>

      <div style={{marginBottom:24}}>
        <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:6}}>NOMBRE D'AGENCES (max 230)</label>
        <input type="number" value={nb} onChange={e=>setNb(Math.min(230,Math.max(1,+e.target.value)))}
          min={1} max={230}
          style={{width:"100%",padding:"10px 14px",border:"1px solid #e0dbd4",borderRadius:7,fontSize:14,boxSizing:"border-box"}}
        />
      </div>

      {!done && <button onClick={scrape} disabled={loading||!ville.trim()}
        style={{width:"100%",padding:"12px",background:loading||!ville.trim()?"#ccc":"#C4621A",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:loading||!ville.trim()?"not-allowed":"pointer",marginBottom:16}}>
        {loading ? "⏳ Scraping en cours..." : "🔍 Lancer le scraping"}
      </button>}

      {progress && <div style={{padding:"12px 16px",background:"#f8f5f0",borderRadius:8,fontSize:13,color:"#444",marginBottom:16,lineHeight:1.6}}>{progress}</div>}

      {loading && <div style={{height:4,background:"#F0ECE4",borderRadius:4,overflow:"hidden",marginBottom:16}}>
        <div style={{height:"100%",background:"#C4621A",borderRadius:4,animation:"progress-anim 1.5s ease-in-out infinite"}}/>
      </div>}

      {done && results.length > 0 && <>
        <div style={{maxHeight:220,overflowY:"auto",border:"1px solid #e0dbd4",borderRadius:8,marginBottom:16}}>
          {results.map((r,i)=><div key={i} style={{padding:"10px 14px",borderBottom:"1px solid #f0ece4",fontSize:13}}>
            <div style={{fontWeight:600,color:"#1c1c1c"}}>{r.agence}</div>
            <div style={{color:"#888",fontSize:12}}>{r.email} · {r.ville}</div>
          </div>)}
        </div>
        <button onClick={()=>onImport(results)}
          style={{width:"100%",padding:"12px",background:"#C4621A",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
          ✅ Importer {results.length} agences dans les prospects
        </button>
      </>}

      {done && results.length === 0 && <div style={{textAlign:"center",color:"#888",padding:20}}>
        Aucune agence trouvée. Essaie une autre ville.
      </div>}
    </div>
  </div>;
};

// ── CSV ROW PARSER ────────────────────────────────────────
const parseCSVRow=(line)=>{
  const result=[];let current="";let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQuotes&&line[i+1]==='"'){current+='"';i++;}else inQuotes=!inQuotes;}
    else if(ch===','&&!inQuotes){result.push(current);current="";}
    else current+=ch;
  }
  result.push(current);return result;
};

  const [showGenericEmail,setShowGenericEmail]=useState(false);
  const [gmailToken,setGmailToken]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{localStorage.setItem("pv_contacts",JSON.stringify(contacts));},[contacts]);
  useEffect(()=>{localStorage.setItem("pv_settings",JSON.stringify(settings));},[settings]);

  useEffect(()=>{
    if(!settings.brevoApiKey) return;
    const doSync = async () => {
      try {
        const stored = JSON.parse(localStorage.getItem("pv_contacts")||"[]");
        // Check all contacts that have been emailed and not yet marked as opened
        const toCheckOpen = stored.filter(c => c.email && c.statut !== "a_contacter" && !c.mailOuvert);
        if (toCheckOpen.length === 0) return;
        const results = await syncBrevoOpenings(toCheckOpen, settings.brevoApiKey);
        setContacts(prev=>prev.map(c=>{
          if(results[c.id]===true && !c.mailOuvert)
            return {...c, mailOuvert:true, statut:c.statut==="mail_envoye"?"ouvert":c.statut};
          return c;
        }));
      } catch(e){ console.log("Brevo sync error:", e); }
    };
    doSync(); // immediate on load
    const interval = setInterval(doSync, 600000); // 10min
    return ()=>clearInterval(interval);
  },[settings.brevoApiKey]);

  // Auto-check Gmail replies every 30s
  useEffect(()=>{
    if(!gmailToken) return;
    const checkReplies = async () => {
      try {
        const stored = JSON.parse(localStorage.getItem("pv_contacts")||"[]");
        const toCheck = stored.filter(c => c.email && !c.mailRepondu && c.statut !== "a_contacter");
        for(const c of toCheck){
          try{
            const reply = await checkGmailReply(c, gmailToken);
            if(reply){
              setContacts(prev=>prev.map(x=>x.id===c.id
                ?{...x,mailRepondu:true,replyContent:reply.body,replyDate:reply.date,replySubject:reply.subject,statut:"repondu"}
                :x));
            }
          }catch(e){}
        }
      }catch(e){}
    };
    checkReplies(); // immediate
    const interval = setInterval(checkReplies, 600000); // 10min
    return ()=>clearInterval(interval);
  },[gmailToken]);

  const [showScraper,setShowScraper]=useState(false);
  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const saveContact=(c)=>{setContacts(p=>{const ex=p.find(x=>x.id===c.id);return ex?p.map(x=>x.id===c.id?c:x):[...p,c];});setShowModal(false);setEditContact(null);showToast("Contact sauvegardé ✅");};
  const deleteContact=(id)=>{setContacts(p=>p.filter(c=>c.id!==id));if(selectedId===id){setView("list");setSelectedId(null);}showToast("Supprimé","err");};
  const updateContact=(c)=>setContacts(p=>p.map(x=>x.id===c.id?c:x));
  const toggleRepondu=(c)=>setContacts(p=>p.map(x=>x.id===c.id?{...x,mailRepondu:!x.mailRepondu,statut:!x.mailRepondu&&x.statut==="ouvert"?"repondu":x.statut}:x));
  const forceBrevoSync=async()=>{
    if(!settings.brevoApiKey) return;
    try{
      const toCheck=contacts.filter(c=>c.email&&c.statut!=="a_contacter"&&!c.mailOuvert);
      console.log("[Brevo] Force sync for",toCheck.length,"contacts");
      const results=await syncBrevoOpenings(toCheck,settings.brevoApiKey);
      console.log("[Brevo] Results:",results);
      setContacts(prev=>prev.map(c=>{
        if(results[c.id]===true&&!c.mailOuvert)
          return {...c,mailOuvert:true,statut:c.statut==="mail_envoye"?"ouvert":c.statut};
        return c;
      }));
    }catch(e){console.warn("[Brevo] Force sync error:",e);}
  };
  const handleBulkGeneric=async(selectedContacts,done)=>{
    if(!settings.brevoApiKey){showToast("Clé Brevo manquante dans Paramètres","err");return;}
    if(!settings.genericS1Avant||!settings.genericS1Apres||!settings.genericS2Avant||!settings.genericS2Apres){showToast("Configurez les 4 images génériques dans Paramètres","err");return;}
    if(!confirm(`Envoyer le mail générique à ${selectedContacts.length} contact${selectedContacts.length>1?"s":""}?`))return;
    showToast(`⏳ Envoi en cours pour ${selectedContacts.length} contacts...`);
    let sent=0,failed=0;
    for(const contact of selectedContacts){
      try{
        const images={s1Pairs:[{avant:settings.genericS1Avant,apres:settings.genericS1Apres}],s2Pairs:[{avant:settings.genericS2Avant,apres:settings.genericS2Apres}]};
        const agence=contact.agence||"[Agence]";
        const subject=`Vos biens méritent plus de visites — ${agence}`;
        const genericAccroche=`Certains de vos biens méritent plus de visites qu'ils n'en génèrent. Je peux changer ça — sans travaux, en 48h.`;
        const genericDesc=`Ces visuels viennent <strong>en complément</strong> de vos photos existantes — pas à leur place. L'objectif n'est pas de tromper l'acheteur, mais de lui permettre de se projeter là où les photos seules ne déclenchent pas la visite.`;
        const genericDesc2=`Concrètement : moins de biens qui stagnent, moins de baisses de prix défensives, plus de visites qualifiées sur les bons biens.`;
        const html=buildEmailHtml("initial",contact,settings,{accroche:genericAccroche,descParagraph:genericDesc,descParagraph2:genericDesc2},images);
        await sendViaBrevo(contact,html,subject,settings);
        const today=new Date().toISOString().split("T")[0];
        setContacts(prev=>prev.map(c=>c.id===contact.id?{...c,mailInitialEnvoye:true,dateJ0:c.dateJ0||today}:c));
        sent++;
        await new Promise(r=>setTimeout(r,600));
      }catch(e){failed++;}
    }
    showToast(`✅ ${sent} mail${sent>1?"s":""} envoyé${sent>1?"s":""}${failed>0?` — ${failed} échec${failed>1?"s":""}`:""}`,failed>0?"err":"");
    if(done)done();
  };
  const autoSaveSettings=(s)=>{setSettings(s);};
  const saveSettings=(s)=>{setSettings(s);showToast("Paramètres sauvegardés ✅");};

  const handleImportCSV=(file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const text=ev.target.result;
        const lines=text.split('\n').filter(l=>l.trim());
        if(lines.length<2){showToast("❌ CSV vide","err");return;}
        const parseBool=(v)=>v==="true"||v==="True"||v==="1"||v===true;
        const existingEmails=new Set(contacts.map(c=>c.email?.toLowerCase().trim()).filter(Boolean));
        const existingNames=new Set(contacts.map(c=>c.agence?.toLowerCase().trim()).filter(Boolean));
        let added=0,skipped=0;
        const newContacts=[...contacts];
        for(let i=1;i<lines.length;i++){
          const row=parseCSVRow(lines[i]);
          if(row.length<2) continue;
          const email=row[0]?.trim();
          const agence=row[1]?.trim();
          const ville=row[2]?.trim()||"";
          const telephone=row[3]?.trim()||"";
          const bien=row[4]?.trim()||"";
          const dateJ0=row[5]?.trim()||"";
          const rawStatut=row[6]?.trim()||"a_contacter";
          const statut=STATUTS.find(s=>s.value===rawStatut)?rawStatut:"a_contacter";
          const mailOuvert=parseBool(row[7]);
          const mailInitialEnvoye=parseBool(row[8]);
          const r1Envoyee=parseBool(row[9]);
          const r2Envoyee=parseBool(row[10]);
          const r3Envoyee=parseBool(row[11]);
          const notes=(row[12]?.trim()||"").replace(/^"+|"+$/g,"");
          if(!email&&!agence) continue;
          const emailMatch=email&&existingEmails.has(email.toLowerCase().trim());
          const nameMatch=agence&&existingNames.has(agence.toLowerCase().trim());
          if(emailMatch||nameMatch){skipped++;continue;}
          newContacts.push({id:uuid(),email,agence,ville,telephone,bien,dateJ0,statut,mailOuvert,mailInitialEnvoye,r1Envoyee,r2Envoyee,r3Envoyee,notes});
          if(email) existingEmails.add(email.toLowerCase().trim());
          if(agence) existingNames.add(agence.toLowerCase().trim());
          added++;
        }
        setContacts(newContacts);
        showToast(`✅ ${added} contacts importés, ${skipped} doublons ignorés`);
      }catch(err){console.error(err);showToast("❌ Erreur lors de l'import CSV","err");}
    };
    reader.readAsText(file);
  };

  const connectGmail=(clientId)=>{
    if(!clientId) return alert("Entrez votre Google Client ID");
    if(!window.google) return alert("Google API non disponible. Rechargez la page.");
    const tc=window.google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:"https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly",
      callback:(r)=>{if(r.access_token){setGmailToken(r.access_token);showToast("Gmail connecté ✅");}}
    });
    tc.requestAccessToken();
  };

  const selectedContact=contacts.find(c=>c.id===selectedId);
  const nav=[{key:"dashboard",icon:"📊",label:"Dashboard"},{key:"list",icon:"👥",label:"Prospects"},{key:"settings",icon:"⚙️",label:"Paramètres"}];

  // ── IMPORT JSON depuis scraper ──────────────────────────────────────────
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) throw new Error("Format invalide");
        const existingEmails = new Set(contacts.map(c => c.email?.toLowerCase()).filter(Boolean));
        const existingNames  = new Set(contacts.map(c => c.agence?.toLowerCase().trim()).filter(Boolean));
        const existingTels   = new Set(contacts.map(c => c.telephone?.replace(/\s/g,"")).filter(Boolean));
        let added = 0, skipped = 0;
        const newContacts = [...contacts];
        imported.forEach(c => {
          const emailMatch = c.email && existingEmails.has(c.email.toLowerCase());
          const nameMatch  = c.agence && existingNames.has(c.agence.toLowerCase().trim());
          const telMatch   = c.telephone && existingTels.has(c.telephone.replace(/\s/g,""));
          if (emailMatch || nameMatch || telMatch) { skipped++; return; }
          newContacts.push(c);
          if (c.email) existingEmails.add(c.email.toLowerCase());
          existingNames.add(c.agence?.toLowerCase().trim());
          if (c.telephone) existingTels.add(c.telephone.replace(/\s/g,""));
          added++;
        });
        setContacts(newContacts);
        showToast(`✅ ${added} agences importées, ${skipped} doublons ignorés`);
      } catch(err) {
        showToast("❌ Fichier invalide — vérifier le JSON", "err");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return <div style={{display:"flex"}}>
    <div className="sidebar">
      <div style={{padding:"28px 20px 22px"}}>
        <div style={{fontSize:9,letterSpacing:4,color:"#9E8878",textTransform:"uppercase",marginBottom:5}}>Paul Visuals</div>
        <div style={{fontSize:17,fontWeight:800,color:"#fff"}}>Prospection</div>
      </div>
      <div style={{padding:"4px 0"}}>
        {nav.map(item=><div key={item.key} className={`nav-item ${view===item.key&&!(view==="list"&&selectedId)?"active":""}`} onClick={()=>{setView(item.key);setSelectedId(null);}}>
          <span style={{fontSize:16}}>{item.icon}</span><span>{item.label}</span>
        </div>)}
        <div className="nav-item" onClick={()=>setShowScraper(false)}>
        </div>
      </div>
      <div style={{position:"absolute",bottom:20,left:0,right:0,padding:"0 14px"}}>
        <div style={{padding:"12px 16px",background:"rgba(255,255,255,0.05)",borderRadius:8}}>
          <div style={{fontSize:11,color:settings.brevoApiKey?"#6EE7B7":gmailToken?"#6EE7B7":"#F87171",fontWeight:600,marginBottom:2}}>
            {settings.brevoApiKey?"✅ Brevo actif":gmailToken?"✅ Gmail connecté":"❌ Aucun envoi configuré"}
          </div>
          <div style={{fontSize:10,color:"#555"}}>{contacts.length} contact{contacts.length!==1?"s":""}</div>
        </div>
      </div>
    </div>

    <div className="main">
      {view==="dashboard"&&<Dashboard contacts={contacts} onViewContact={id=>{setSelectedId(id);setView("list");}} onGoToList={()=>setView("list")}/>}
      {view==="list"&&!selectedId&&<ProspectList contacts={contacts} onView={id=>setSelectedId(id)} onAdd={()=>{setEditContact(null);setShowModal(true);}} onEdit={c=>{setEditContact(c);setShowModal(true);}} onDelete={deleteContact} onToggleRepondu={toggleRepondu} onForceSync={settings.brevoApiKey?forceBrevoSync:null} onScrape={()=>setShowScraper(true)} onBulkGeneric={handleBulkGeneric}/>}
      {view==="list"&&selectedId&&selectedContact&&<ProspectDetail contact={selectedContact} onBack={()=>setSelectedId(null)} onEdit={c=>{setEditContact(c);setShowModal(true);}} onSendEmail={()=>setShowEmail(true)} onSendGeneric={()=>setShowGenericEmail(true)} onUpdate={updateContact} onDelete={deleteContact} gmailToken={gmailToken}/>}
      {view==="settings"&&<Settings settings={settings} onSave={saveSettings} onAutoSave={autoSaveSettings} onImportCSV={handleImportCSV} gmailToken={gmailToken} onConnect={connectGmail} onDisconnect={()=>{setGmailToken(null);showToast("Gmail déconnecté","err");}} contacts={contacts}/>}
    </div>

    {showModal&&<ContactModal contact={editContact} onSave={saveContact} onClose={()=>{setShowModal(false);setEditContact(null);}}/>}

    {showScraper&&<ScraperModal
      contacts={contacts}
      geminiApiKey={settings.geminiApiKey||""}
      onClose={()=>setShowScraper(false)}
      onImport={(newOnes)=>{
        setContacts(prev=>[...prev,...newOnes]);
        showToast(`✅ ${newOnes.length} agences ajoutées`);
        setShowScraper(false);
      }}
    />}

    {showGenericEmail&&selectedContact&&<GenericEmailModal contact={selectedContact} settings={settings}
      onClose={()=>setShowGenericEmail(false)}
      onSent={(messageId)=>{
        const now=new Date().toISOString().split("T")[0];
        updateContact({...selectedContact,mailInitialEnvoye:true,dateJ0:selectedContact.dateJ0||now,statut:"mail_envoye",...(messageId?{brevoMessageId:messageId}:{})});
        setShowGenericEmail(false);showToast("Mail générique envoyé ✅");
      }}/>}

    {showEmail&&selectedContact&&<EmailModal contact={selectedContact} gmailToken={gmailToken} settings={settings}
      onClose={()=>setShowEmail(false)}
      onSent={(tpl,messageId)=>{
        const now=new Date().toISOString().split("T")[0];
        const upd={
          initial:{mailInitialEnvoye:true,dateJ0:selectedContact.dateJ0||now,statut:"mail_envoye",...(messageId?{brevoMessageId:messageId}:{})},
          r1:{r1Envoyee:true},r2:{r2Envoyee:true},r3:{r3Envoyee:true}
        };
        updateContact({...selectedContact,...(upd[tpl]||{})});
        setShowEmail(false);showToast("Mail envoyé ✅");
      }}/>}

    {toast&&<div className="toast" style={{position:"fixed",bottom:24,right:24,background:toast.type==="err"?"#1C1C1C":"#C4621A",color:"white",padding:"12px 22px",borderRadius:9,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.22)",zIndex:200}}>{toast.msg}</div>}
  </div>;
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
